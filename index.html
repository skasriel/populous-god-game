<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Populous - God Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Courier New', monospace;
    }
    #game-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    #hud {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      pointer-events: none;
      z-index: 10;
    }
    #hud > * {
      pointer-events: auto;
    }
    #top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 16px;
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      font-size: 14px;
    }
    #mana-container {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #mana-bar-bg {
      width: 200px;
      height: 16px;
      background: #333;
      border: 1px solid #666;
    }
    #mana-bar {
      height: 100%;
      background: #44aaff;
      width: 50%;
      transition: width 0.3s;
    }
    #population-display {
      display: flex;
      gap: 20px;
    }
    .pop-player { color: #4488ff; }
    .pop-enemy { color: #ff4444; }
    #powers-bar {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
    }
    .power-btn {
      width: 56px;
      height: 56px;
      background: rgba(0, 0, 0, 0.75);
      border: 2px solid #555;
      color: #ccc;
      font-size: 10px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      transition: border-color 0.2s, background 0.2s;
    }
    .power-btn:hover {
      border-color: #aaa;
      background: rgba(40, 40, 40, 0.85);
    }
    .power-btn.active {
      border-color: #44aaff;
      background: rgba(30, 60, 100, 0.85);
    }
    .power-btn.disabled {
      opacity: 0.4;
      cursor: default;
    }
    .power-btn .icon {
      font-size: 20px;
      margin-bottom: 2px;
    }
    .power-btn .cost {
      font-size: 8px;
      color: #888;
    }
    #mode-indicator {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 14px;
      background: rgba(0,0,0,0.6);
      padding: 4px 12px;
      border-radius: 4px;
    }
    #game-over-screen {
      display: none;
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8);
      color: #fff;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    #game-over-screen.visible {
      display: flex;
    }
    #game-over-screen h1 {
      font-size: 48px;
      margin-bottom: 16px;
    }
    #game-over-screen button {
      padding: 12px 32px;
      font-size: 18px;
      cursor: pointer;
      background: #44aaff;
      border: none;
      color: #fff;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
    }
    #minimap {
      position: absolute;
      bottom: 16px;
      right: 16px;
      border: 2px solid #555;
    }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  <div id="hud">
    <div id="top-bar">
      <div id="mana-container">
        <span>MANA</span>
        <div id="mana-bar-bg"><div id="mana-bar"></div></div>
        <span id="mana-value">0</span>
      </div>
      <div id="population-display">
        <span class="pop-player">YOU: <span id="player-pop">0</span></span>
        <span class="pop-enemy">ENEMY: <span id="enemy-pop">0</span></span>
      </div>
    </div>
    <div id="mode-indicator">RAISE TERRAIN (Left-click: raise | Right-click: lower | M: place magnet)</div>
    <div id="powers-bar"></div>
  </div>
  <div id="game-over-screen">
    <h1 id="game-over-text">VICTORY</h1>
    <p id="game-over-sub" style="margin-bottom:24px; font-size:16px; color:#aaa;"></p>
    <button id="restart-btn">Play Again</button>
  </div>
  <canvas id="minimap" width="128" height="128"></canvas>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>

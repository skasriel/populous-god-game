<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Populous - God Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #000; font-family: 'Courier New', monospace;
    }
    #game-canvas { width: 100%; height: 100%; display: block; }

    /* ═══════════════════════════════════════════
       Populous-style UI — matching original layout
       Minimap: upper-left
       Command grid: left side, below minimap
       Powers shelf: top center, hanging down
       Status shield: upper right
       Utility icons: bottom right
       ═══════════════════════════════════════════ */

    /* ── Minimap (UPPER LEFT — like original) ── */
    #minimap-frame {
      position: absolute;
      top: 0; left: 0;
      z-index: 10;
      background: #2a2218;
      border: 3px solid #c0a050;
      border-top: none; border-left: none;
      padding: 3px;
    }
    #minimap {
      border: 2px solid #8a6a40;
      image-rendering: pixelated;
      display: block;
    }

    /* ── Left Command Panel (below minimap) ── */
    #cmd-panel {
      position: absolute;
      top: 96px; left: 0;
      width: 172px;
      background: #1a1610;
      border: 2px solid #5a4a30;
      border-left: none;
      z-index: 10;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(5, 1fr);
      gap: 1px;
      padding: 3px;
    }
    .cmd-btn {
      background: #2a2418;
      border: 1px solid #4a3a28;
      color: #b0a888;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0px;
      padding: 2px 0;
      transition: background 0.1s;
    }
    .cmd-btn:hover { background: #3a3020; border-color: #8a7a50; }
    .cmd-btn.active { background: #4a3a18; border-color: #c0a040; color: #fff; }
    .cmd-btn .cmd-icon { font-size: 18px; line-height: 1; }
    .cmd-btn .cmd-label { font-size: 6px; color: #706848; letter-spacing: 0.5px; }

    /* ── Mana Gauge (below command panel) ── */
    #mana-gauge {
      position: absolute;
      top: 282px; left: 0;
      width: 172px;
      background: #1a1610;
      border: 2px solid #5a4a30;
      border-left: none; border-top: none;
      padding: 4px 6px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    #mana-gauge .mana-label { font-size: 7px; color: #8a7a50; letter-spacing: 1px; }
    #mana-bar-bg { flex: 1; height: 8px; background: #0a0808; border: 1px solid #5a4a30; }
    #mana-bar { height: 100%; background: linear-gradient(to right, #4a3a00, #c0a040); width: 10%; transition: width 0.3s; }
    #mana-value { font-size: 9px; color: #c0a050; min-width: 24px; text-align: right; }

    /* ── Divine Powers Shelf (top center, hanging down) ── */
    #powers-shelf {
      position: absolute;
      top: 0;
      left: 50%; transform: translateX(-50%);
      display: flex; align-items: flex-start;
      z-index: 10;
    }
    #powers-shelf-bg {
      background: linear-gradient(to bottom, #6a5030, #4a3820);
      border: 2px solid #8a6a40; border-top: none;
      border-radius: 0 0 6px 6px;
      padding: 6px 8px 8px;
      display: flex; gap: 3px; align-items: flex-end;
    }
    .shelf-pillar {
      width: 8px; height: 56px;
      background: linear-gradient(to right, #8a6a40, #c0a050, #8a6a40);
      border-radius: 0 0 2px 2px;
    }
    .power-btn {
      width: 44px; height: 46px;
      background: #2a2218;
      border: 1px solid #6a5a30;
      color: #c0a050; font-size: 9px;
      cursor: pointer;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1px;
      transition: border-color 0.15s, background 0.15s;
    }
    .power-btn:hover { border-color: #c0a050; background: #3a3020; }
    .power-btn.active { border-color: #e0c060; background: #4a3a10; box-shadow: 0 0 6px rgba(224,192,96,0.4); }
    .power-btn.disabled { opacity: 0.3; cursor: default; }
    .power-btn .icon { font-size: 18px; line-height: 1; color: #c0a050; }
    .power-btn .pname { font-size: 6px; color: #8a7a50; }
    .power-btn .cost { font-size: 6px; color: #6a5a40; }

    /* ── Status Shield (upper right) ── */
    #status-panel {
      position: absolute;
      top: 0; right: 0;
      width: 90px; height: 100px;
      background: #4a1010;
      border: 2px solid #8a3020;
      border-top: none; border-right: none;
      border-radius: 0 0 0 4px;
      z-index: 10;
      display: flex; flex-direction: column;
      align-items: center;
      padding: 6px 4px; gap: 3px;
    }
    #status-panel .shield-icon { font-size: 24px; color: #ddd; }
    .pop-row { display: flex; align-items: center; gap: 3px; font-size: 10px; width: 100%; }
    .pop-row .pop-label { width: 16px; text-align: center; font-size: 10px; font-weight: bold; }
    .pop-bar-bg { flex: 1; height: 8px; background: #1a0808; border: 1px solid #5a2020; }
    .pop-bar-fill { height: 100%; transition: width 0.3s; }
    .pop-bar-fill.player { background: #4488ff; }
    .pop-bar-fill.enemy { background: #ff4444; }
    .pop-count { font-size: 9px; width: 22px; text-align: right; }

    /* ── Bottom-right Utility Icons ── */
    #utility-bar {
      position: absolute;
      bottom: 0; right: 0;
      height: 28px;
      background: #1a1610;
      border: 1px solid #5a4a30;
      border-bottom: none; border-right: none;
      display: flex; align-items: center;
      padding: 0 10px; gap: 14px;
      z-index: 10;
    }
    .util-btn {
      background: none; border: none;
      color: #8a7a50; font-size: 13px;
      cursor: pointer; font-family: 'Courier New', monospace;
    }
    .util-btn:hover { color: #c0a050; }

    /* ── Mode indicator (bottom center) ── */
    #mode-indicator {
      position: absolute;
      bottom: 6px; left: 178px; right: 120px;
      color: #c0a050; font-size: 10px;
      background: rgba(26,22,16,0.85);
      padding: 3px 10px;
      border: 1px solid #4a3a28;
      white-space: nowrap; z-index: 10;
      text-align: center;
    }

    /* ── Game Over ── */
    #game-over-screen {
      display: none; position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85); color: #fff;
      flex-direction: column; align-items: center; justify-content: center;
      z-index: 100;
    }
    #game-over-screen.visible { display: flex; }
    #game-over-screen h1 { font-size: 48px; margin-bottom: 16px; }
    #game-over-screen button {
      padding: 12px 32px; font-size: 18px; cursor: pointer;
      background: #c0a040; border: 2px solid #8a6a40;
      color: #fff; font-family: 'Courier New', monospace;
    }
    #game-over-screen button:hover { background: #d0b050; }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>

  <!-- ── Minimap (UPPER LEFT) ── -->
  <div id="minimap-frame">
    <canvas id="minimap" width="80" height="80"></canvas>
  </div>

  <!-- ── Left Command Panel (below minimap) ── -->
  <div id="cmd-panel">
    <!-- Row 1: Combat / behavior (matching original top row: skull, crossed, broadcast) -->
    <button class="cmd-btn" id="cmd-fight" title="Fight mode">
      <span class="cmd-icon">&#x2620;</span>
      <span class="cmd-label">FIGHT</span>
    </button>
    <button class="cmd-btn" id="cmd-gather" title="Gather followers">
      <span class="cmd-icon">&#x2694;</span>
      <span class="cmd-label">GATHER</span>
    </button>
    <button class="cmd-btn" id="cmd-magnet" title="Papal Magnet (M)">
      <span class="cmd-icon">(&#xB7;)</span>
      <span class="cmd-label">MAGNET</span>
    </button>
    <!-- Row 2: Settle + compass-like directional area -->
    <button class="cmd-btn" id="cmd-settle" title="Settle followers">
      <span class="cmd-icon">&#x2302;</span>
      <span class="cmd-label">SETTLE</span>
    </button>
    <button class="cmd-btn" id="cmd-raise" title="Raise Terrain (Left Click)">
      <span class="cmd-icon">&#x25B2;</span>
      <span class="cmd-label">RAISE</span>
    </button>
    <button class="cmd-btn" id="cmd-lower" title="Lower Terrain (Right Click)">
      <span class="cmd-icon">&#x25BC;</span>
      <span class="cmd-label">LOWER</span>
    </button>
    <!-- Row 3: Arrows / navigation (like original compass row) -->
    <button class="cmd-btn" id="cmd-zoom-out" title="Zoom Out">
      <span class="cmd-icon">&#x2190;</span>
      <span class="cmd-label">ZOOM-</span>
    </button>
    <button class="cmd-btn" id="cmd-center" title="Center view">
      <span class="cmd-icon">&#x25C7;</span>
      <span class="cmd-label">CENTER</span>
    </button>
    <button class="cmd-btn" id="cmd-zoom-in" title="Zoom In">
      <span class="cmd-icon">&#x2192;</span>
      <span class="cmd-label">ZOOM+</span>
    </button>
    <!-- Row 4: Person icons (matching original bottom rows) -->
    <button class="cmd-btn" id="cmd-query" title="Query tile">
      <span class="cmd-icon">&#x2020;</span>
      <span class="cmd-label">QUERY</span>
    </button>
    <button class="cmd-btn" id="cmd-flag" title="Set flag">
      <span class="cmd-icon">&#x2691;</span>
      <span class="cmd-label">FLAG</span>
    </button>
    <button class="cmd-btn" id="cmd-info" title="Info">
      <span class="cmd-icon">?</span>
      <span class="cmd-label">INFO</span>
    </button>
    <!-- Row 5: More icons (matching original bottom row) -->
    <button class="cmd-btn" id="cmd-speed" title="Game Speed">
      <span class="cmd-icon">&#x23E9;</span>
      <span class="cmd-label">SPEED</span>
    </button>
    <button class="cmd-btn" id="cmd-sound" title="Sound toggle">
      <span class="cmd-icon">&#x266B;</span>
      <span class="cmd-label">SOUND</span>
    </button>
    <button class="cmd-btn" id="cmd-globe" title="Overview">
      <span class="cmd-icon">&#x2316;</span>
      <span class="cmd-label">VIEW</span>
    </button>
  </div>

  <!-- ── Mana Gauge (below command panel) ── -->
  <div id="mana-gauge">
    <span class="mana-label">MANA</span>
    <div id="mana-bar-bg"><div id="mana-bar"></div></div>
    <span id="mana-value">0</span>
  </div>

  <!-- ── Divine Powers Shelf (top center, hanging down) ── -->
  <div id="powers-shelf">
    <div class="shelf-pillar"></div>
    <div id="powers-shelf-bg">
      <div id="powers-bar"></div>
    </div>
    <div class="shelf-pillar"></div>
  </div>

  <!-- ── Status Shield (upper right) ── -->
  <div id="status-panel">
    <div class="shield-icon">&#x2694;</div>
    <div class="pop-row">
      <span class="pop-label" style="color:#4488ff;">&#x2020;</span>
      <div class="pop-bar-bg"><div class="pop-bar-fill player" id="player-pop-bar" style="width:50%"></div></div>
      <span class="pop-count" style="color:#4488ff;" id="player-pop">0</span>
    </div>
    <div class="pop-row">
      <span class="pop-label" style="color:#ff4444;">&#x2620;</span>
      <div class="pop-bar-bg"><div class="pop-bar-fill enemy" id="enemy-pop-bar" style="width:50%"></div></div>
      <span class="pop-count" style="color:#ff4444;" id="enemy-pop">0</span>
    </div>
  </div>

  <!-- ── Mode indicator (bottom center) ── -->
  <div id="mode-indicator">LEFT: Raise | RIGHT: Lower | M: Magnet</div>

  <!-- ── Bottom-right Utility Icons ── -->
  <div id="utility-bar">
    <span class="util-btn" id="util-help" title="Help">?</span>
    <span class="util-btn" id="util-pause" title="Pause">&#x23F8;</span>
    <span class="util-btn" title="Settings">&#x2699;</span>
  </div>

  <!-- ── Game Over overlay ── -->
  <div id="game-over-screen">
    <h1 id="game-over-text">VICTORY</h1>
    <p id="game-over-sub" style="margin-bottom:24px; font-size:16px; color:#aaa;"></p>
    <button id="restart-btn">Play Again</button>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
